async function loadStates(userId) {
  const { data, error } = await supabase.from('book_states').select('*').eq('user_id', userId);
  if (error) { console.error('loadStates:', error); return {}; }
  const map = {};
  (data || []).forEach(r => { map[r.book_id] = r; });
  return map;
}

async function saveState(userId, bookId, read, wishlist, rating, extraData) {
  await supabase.from('book_states').upsert({
    user_id: userId,
    book_id: String(bookId),
    read, wishlist, rating,
    extra_data: extraData || null,
    updated_at: new Date().toISOString()
  }, { onConflict: 'book_id,user_id' });
}

async function deleteState(userId, bookId) {
  await supabase.from('book_states').delete().eq('user_id', userId).eq('book_id', String(bookId));
}

// ── Claude API ──
function getApiKey() { return window._claudeApiKey || localStorage.getItem('claude_api_key') || ''; }

async function callClaude(prompt, maxTokens = 1000) {
  const apiKey = getApiKey();
  const headers = { "Content-Type": "application/json" };
  if (apiKey) {
    headers["x-api-key"] = apiKey;
    headers["anthropic-version"] = "2023-06-01";
    headers["anthropic-dangerous-direct-browser-access"] = "true";
  }
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers,
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: maxTokens,
      messages: [{ role: "user", content: prompt }]
    })
  });
  const rawText = await response.text();
  let data;
  try { data = JSON.parse(rawText); }
  catch(e) { throw new Error("Status " + response.status + ": " + rawText.slice(0,150)); }
  if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
  if (!data.content) throw new Error("No content field. Got: " + Object.keys(data).join(", "));
  return data.content.map(b => b.text || "").join("").trim();
}

function StarRating({ rating }) {
  const full = Math.floor(rating), half = rating % 1 >= 0.5;
  return (
    <div style={{display:"flex",alignItems:"center",gap:2}}>
      {[1,2,3,4,5].map(i=>(
        <span key={i} style={{fontSize:12,color:i<=full?"#c08b20":i===full+1&&half?"#c08b20":"#ccc"}}>
          {i<=full?"★":i===full+1&&half?"⯨":"☆"}
        </span>
      ))}
      <span style={{fontSize:11,color:"#8a8fa8",marginLeft:3}}>{Number(rating).toFixed(1)}</span>
    </div>
  );
}

function AuthorDropdown({ books, selectedAuthor, onChange }) {
  const [open,setOpen]=useState(false);
  const ref=useRef(null);
  const authorList=useMemo(()=>{
    const map={};
    books.forEach(b=>{map[b.author]=(map[b.author]||0)+1;});
    return [["All Authors",books.length],...Object.entries(map).sort((a,b)=>a[0].localeCompare(b[0]))];
  },[books]);
  useEffect(()=>{
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false)};
    document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);
  },[]);
  return (
    <div ref={ref} style={{position:"relative",zIndex:50}}>
      <button onClick={()=>setOpen(o=>!o)} style={{background:"#faf9f7",border:"1px solid #ccc8c0",borderRadius:10,padding:"9px 14px",color:"#3a3a4a",fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:8,minWidth:180,justifyContent:"space-between"}}>
        <span>👤 {selectedAuthor==="all"?"All Authors":selectedAuthor}</span>
        <span style={{color:"#9a9aaa",fontSize:10}}>{open?"▲":"▼"}</span>
      </button>
      {open&&(
        <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,background:"#faf9f7",border:"1px solid #ccc8c0",borderRadius:12,boxShadow:"0 8px 30px rgba(0,0,0,.13)",maxHeight:300,overflowY:"auto",minWidth:220,zIndex:200}}>
          {authorList.map(([author,count])=>{
            const val=author==="All Authors"?"all":author;
            const active=selectedAuthor===val;
            return (
              <div key={author} onClick={()=>{onChange(val);setOpen(false)}}
                style={{padding:"9px 16px",cursor:"pointer",display:"flex",justifyContent:"space-between",background:active?"#edeaf5":"transparent",color:active?"#342058":"#3a3a4a",fontWeight:active?700:400,fontSize:13,borderBottom:"1px solid #eee8e0"}}
                onMouseEnter={e=>{if(!active)e.currentTarget.style.background="#f0ede8"}}
                onMouseLeave={e=>{if(!active)e.currentTarget.style.background="transparent"}}>
                <span>{author}</span>
                <span style={{fontSize:11,color:"#9a9aaa",background:"#e8e4dc",padding:"1px 7px",borderRadius:20}}>{count}</span>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function AddBookModal({ onClose, onAdd, existingBooks }) {
  const [titleInput,setTitleInput]=useState("");
  const [loading,setLoading]=useState(false);
  const [preview,setPreview]=useState(null);
  const [error,setError]=useState("");
  const [added,setAdded]=useState(false);
  const inputRef=useRef(null);
  useEffect(()=>{setTimeout(()=>inputRef.current?.focus(),80);},[]);

  const fetchDetails=async()=>{
    const title=titleInput.trim();
    if(!title)return;
    if(existingBooks.some(b=>b.title.toLowerCase()===title.toLowerCase())){
      setError("Already in your library.");return;
    }
    setLoading(true);setError("");setPreview(null);
    try {
      const prompt=`Look up the book titled: ${title}
Return ONLY a raw JSON object. No markdown. No explanation. No backticks.
Fields required: title, author, year (number), rating (number like 4.2), nyt (true or false), genre, series (string or null), synopsis (2 sentences), tags (array of 3 strings), cat, found (true).
For cat use exactly one of: vince_flynn, michael_connelly, harlan_coben, david_baldacci, indian, spy_espionage, british_thriller, nonfiction, self_help.
If book is unknown return: {"found":false,"message":"not found"}
Your response must start with { and end with }. Nothing before or after.`;
      const text=await callClaude(prompt,800);
      const s=text.indexOf("{"),e=text.lastIndexOf("}");
      if(s===-1||e===-1)throw new Error("No JSON found in response");
      const parsed=JSON.parse(text.slice(s,e+1));
      if(!parsed.found){setError(parsed.message||"Book not found.");}
      else{setPreview(parsed);}
    }catch(e){setError(""+e.message);}
    setLoading(false);
  };

  const handleAdd=(wishlist)=>{
    onAdd({id:Date.now()+Math.random(),cat:preview.cat||"british_thriller",title:preview.title,author:preview.author,year:preview.year,rating:preview.rating,nyt:preview.nyt||false,tags:preview.tags||[],read:false,wishlist});
    setAdded(true);setTimeout(onClose,800);
  };
  const col=preview?(CAT_COLORS[preview.cat]||CAT_COLORS.british_thriller):CAT_COLORS.british_thriller;
  const cat=preview?CATEGORIES.find(c=>c.id===preview.cat):null;
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.38)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#faf9f7",border:"1px solid #d8d4cc",borderRadius:18,padding:28,width:"100%",maxWidth:520,boxShadow:"0 20px 60px rgba(0,0,0,.18)",maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:20}}>
          <div>
            <div style={{fontSize:9,color:"#6a4015",letterSpacing:3,textTransform:"uppercase",fontFamily:"monospace",fontWeight:700,marginBottom:5}}>◆ ADD A BOOK</div>
            <div style={{fontSize:18,fontWeight:900,color:"#1e1e2a"}}>Add to Your Library</div>
            <div style={{fontSize:12,color:"#9a9aaa",marginTop:3}}>Type a title — AI will fetch all the details</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#9a9aaa",fontSize:22,cursor:"pointer"}}>×</button>
        </div>
        <div style={{display:"flex",gap:8,marginBottom:6}}>
          <input ref={inputRef} value={titleInput} onChange={e=>{setTitleInput(e.target.value);setError("");setPreview(null);setAdded(false)}}
            onKeyDown={e=>e.key==="Enter"&&!loading&&fetchDetails()}
            placeholder="e.g. The Thursday Murder Club…"
            style={{flex:1,background:"#f0ede8",border:"1.5px solid #ccc8c0",borderRadius:10,padding:"11px 14px",color:"#1e1e2a",fontSize:14,outline:"none"}}/>
          <button onClick={fetchDetails} disabled={loading||!titleInput.trim()}
            style={{background:loading?"#c0bcb4":"#7a3530",border:"none",borderRadius:10,padding:"11px 18px",color:"#fff",fontWeight:700,cursor:loading?"default":"pointer",fontSize:13,minWidth:80}}>
            {loading?"⟳":"Fetch"}
          </button>
        </div>
        <div style={{fontSize:11,color:"#9a9aaa",marginBottom:18}}>Press Enter or click Fetch to look up the book</div>
        {loading&&<div style={{textAlign:"center",padding:"24px 0"}}><div style={{fontSize:28,animation:"spin 1s linear infinite",display:"inline-block"}}>◎</div><div style={{color:"#9a9aaa",fontSize:13,marginTop:8}}>Fetching details…</div></div>}
        {error&&<div style={{background:"#f5eeee",border:"1px solid #d4b8b5",borderRadius:10,padding:"12px 16px",color:"#7a3530",fontSize:13,marginBottom:12}}>⚠️ {error}</div>}
        {preview&&!loading&&(
          <div style={{background:col.bg,border:`1px solid ${col.border}`,borderTop:`3px solid ${col.accent}`,borderRadius:14,padding:"18px 20px",animation:"fadeIn .3s ease"}}>
            <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:8}}>
              {cat&&<span style={{fontSize:9,color:col.accent,textTransform:"uppercase",letterSpacing:1.5,fontFamily:"monospace",fontWeight:700}}>{cat.emoji} {cat.label}</span>}
              <span style={{fontSize:9,background:col.tag,color:col.tagText,padding:"1px 6px",borderRadius:10,fontWeight:600}}>{preview.year}</span>
              {preview.nyt&&<span style={{background:"#8b2e2e",color:"#fff",fontSize:8,padding:"2px 6px",borderRadius:20,fontWeight:800}}>NYT</span>}
              {preview.series&&<span style={{fontSize:9,color:"#9a9aaa",background:"#ede9e2",padding:"2px 8px",borderRadius:20}}>{preview.series}</span>}
            </div>
            <div style={{fontSize:18,fontWeight:900,color:"#1e1e2a",lineHeight:1.2,marginBottom:3}}>{preview.title}</div>
            <div style={{fontSize:12,color:"#7a7a8a",marginBottom:8}}>by {preview.author}</div>
            <div style={{marginBottom:8}}><StarRating rating={preview.rating}/></div>
            <div style={{fontSize:12,color:"#4a4a5a",lineHeight:1.6,marginBottom:12,background:"rgba(255,255,255,.6)",borderRadius:8,padding:"10px 12px",borderLeft:`3px solid ${col.accent}40`}}>{preview.synopsis}</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:18}}>
              {(preview.tags||[]).map(t=><span key={t} style={{background:col.tag,color:col.tagText,fontSize:9,padding:"2px 8px",borderRadius:20}}>{t}</span>)}
            </div>
            {!added?(
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>handleAdd(false)} style={{flex:1,background:col.accent,border:"none",borderRadius:10,padding:"11px 0",color:"#fff",fontWeight:800,cursor:"pointer",fontSize:13}}>+ Add to Library</button>
                <button onClick={()=>handleAdd(true)} style={{flex:1,background:"#faf9f7",border:`1.5px solid ${col.accent}`,borderRadius:10,padding:"11px 0",color:col.accent,fontWeight:700,cursor:"pointer",fontSize:13}}>♥ Wishlist</button>
              </div>
            ):(
              <div style={{textAlign:"center",padding:"10px 0",color:"#28622a",fontWeight:700}}>✓ Added!</div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ── Countdown Timer ──
function CountdownTimer({ nextRefresh }) {
  const [t,setT]=useState("");
  useEffect(()=>{
    const upd=()=>{const d=nextRefresh-new Date();if(d<=0){setT("Refreshing…");return;}setT(Math.floor(d/3600000)+"h "+Math.floor((d%3600000)/60000)+"m");};
    upd();const id=setInterval(upd,60000);return()=>clearInterval(id);
  },[nextRefresh]);
  return <span>{t}</span>;
}

function LibraryTab({ books, setBooks }) {
  const [activeCat,setActiveCat]=useState("all");
  const [activeFilter,setActiveFilter]=useState("all");
  const [selectedAuthor,setSelectedAuthor]=useState("all");
  const [search,setSearch]=useState("");
  const [showAI,setShowAI]=useState(false);
  const [showAdd,setShowAdd]=useState(false);
  const [selectedGenre,setSelectedGenre]=useState("all");
  const [selectedYear,setSelectedYear]=useState("all");

  const filtered=useMemo(()=>books.filter(b=>{
    if(activeCat!=="all"&&b.cat!==activeCat)return false;
    if(activeFilter==="read"&&!b.read)return false;
    if(activeFilter==="wishlist"&&!b.wishlist)return false;
    if(activeFilter==="unread"&&b.read)return false;
    if(activeFilter==="nyt"&&!b.nyt)return false;
    if(selectedAuthor!=="all"&&b.author!==selectedAuthor)return false;
    if(search){const q=search.toLowerCase();if(!b.title.toLowerCase().includes(q)&&!b.author.toLowerCase().includes(q)&&!b.tags.some(t=>t.toLowerCase().includes(q)))return false;}
    if(selectedGenre!=="all"&&b.genre!==selectedGenre)return false;
    if(selectedYear!=="all"){
      const [from,to]=selectedYear.split("-").map(Number);
      if(b.year<from||b.year>to)return false;
    }
    return true;
  }).sort((a,b)=>a.author.localeCompare(b.author)||a.year-b.year),[books,activeCat,activeFilter,selectedAuthor,search,selectedGenre,selectedYear]);

  const catCounts=useMemo(()=>Object.fromEntries(CATEGORIES.map(c=>[c.id,books.filter(b=>b.cat===c.id).length])),[books]);
  const toggleRead=id=>setBooks(bs=>bs.map(b=>b.id===id?{...b,read:!b.read}:b));
  const toggleWishlist=id=>setBooks(bs=>bs.map(b=>b.id===id?{...b,wishlist:!b.wishlist}:b));
  const deleteBook=id=>setBooks(bs=>bs.filter(b=>b.id!==id));
  const addBook=book=>{setBooks(bs=>[{...book,id:Date.now()+Math.random(),...(!book.read&&{read:false}),...(!book.wishlist&&{wishlist:false})},bs.filter(b=>b.title.toLowerCase()!==book.title.toLowerCase())].flat());setShowAI(false);setShowAdd(false);};

  const authorGroups=useMemo(()=>{
    const g={};
    filtered.forEach(b=>{if(!g[b.author])g[b.author]=[];g[b.author].push(b);});
    return Object.entries(g).sort(([a],[b])=>a.localeCompare(b));
  },[filtered]);

  return(
    <div style={{maxWidth:1400,margin:"0 auto",padding:"16px 24px"}}>
      {showAI&&<AIModal onClose={()=>setShowAI(false)} onAdd={addBook}/>}
      {showAdd&&<AddBookModal onClose={()=>setShowAdd(false)} onAdd={addBook} existingBooks={books}/>}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",marginBottom:14}}>

          style={{background:"#faf9f7",border:"1px solid #ccc8c0",borderRadius:10,padding:"9px 14px",color:"#2c2c3a",fontSize:13,outline:"none",width:240}}/>
        <AuthorDropdown books={books} selectedAuthor={selectedAuthor} onChange={setSelectedAuthor}/>
        <select value={selectedGenre} onChange={e=>setSelectedGenre(e.target.value)}
          style={{background:"#faf9f7",border:"1px solid #ccc8c0",borderRadius:10,padding:"9px 14px",color:"#3a3a4a",fontSize:13,cursor:"pointer",outline:"none",boxShadow:"0 1px 3px rgba(0,0,0,.06)"}}>
          <option value="all">🎭 All Genres</option>
          {GENRES.map(g=><option key={g} value={g}>{g}</option>)}
        </select>
        <select value={selectedYear} onChange={e=>setSelectedYear(e.target.value)}
          style={{background:"#faf9f7",border:"1px solid #ccc8c0",borderRadius:10,padding:"9px 14px",color:"#3a3a4a",fontSize:13,cursor:"pointer",outline:"none",boxShadow:"0 1px 3px rgba(0,0,0,.06)"}}>

          <option value="2010-2014">2010 – 2014</option>
          <option value="2015-2019">2015 – 2019</option>
          <option value="2020-2025">2020 – 2025</option>

        <div style={{marginLeft:"auto",display:"flex",gap:8}}>
          <button onClick={()=>setShowAdd(true)} style={{background:"#28502a",border:"none",borderRadius:10,padding:"9px 18px",color:"#fff",fontWeight:700,cursor:"pointer",fontSize:13}}>+ Add Book</button>
          <button onClick={()=>setShowAI(true)} style={{background:"#7a3530",border:"none",borderRadius:10,padding:"9px 18px",color:"#fff",fontWeight:700,cursor:"pointer",fontSize:13}}>✦ AI Discover</button>
        </div>
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>
        <button onClick={()=>setActiveCat("all")} style={{padding:"5px 13px",borderRadius:20,border:`1.5px solid ${activeCat==="all"?"#7a3530":"#ccc8c0"}`,background:activeCat==="all"?"#ede0df":"#faf9f7",color:activeCat==="all"?"#7a3530":"#6a6a7a",cursor:"pointer",fontSize:11,fontWeight:600}}>All ({books.length})</button>
        {CATEGORIES.map(c=>{const col=CAT_COLORS[c.id];const active=activeCat===c.id;return(

      ):(
        authorGroups.map(([author,abooks])=>{

          );
        })
      )}
    </div>
  );

          <input type="email" value={email} onChange={e=>setEmail(e.target.value)}
            placeholder="Email address"
            style={{background:"#f0ede8",border:"1.5px solid #ccc8c0",borderRadius:10,padding:"12px 14px",fontSize:14,outline:"none",color:"#1e1e2a"}}/>
          {mode !== "forgot" && (
            <input type="password" value={password} onChange={e=>setPassword(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&handle()}
              placeholder="Password"
              style={{background:"#f0ede8",border:"1.5px solid #ccc8c0",borderRadius:10,padding:"12px 14px",fontSize:14,outline:"none",color:"#1e1e2a"}}/>
          )}
        </div>

        <button onClick={handle} disabled={loading}
          style={{width:"100%",background:loading?"#c0bcb4":"#7a3530",border:"none",borderRadius:10,padding:"13px 0",color:"#fff",fontWeight:800,fontSize:14,cursor:loading?"default":"pointer",marginBottom:14}}>
          {loading ? "⟳ Please wait…" : mode==="signup" ? "Create Account" : mode==="forgot" ? "Send Reset Email" : "Sign In"}
        </button>

        <div style={{display:"flex",justifyContent:"center",gap:16,fontSize:12,color:"#7a7a8a"}}>
          {mode==="login" && <>
            <span onClick={()=>{setMode("signup");setError("");setMessage("");}} style={{cursor:"pointer",color:"#7a3530",fontWeight:600}}>Create account</span>
            <span>·</span>
            <span onClick={()=>{setMode("forgot");setError("");setMessage("");}} style={{cursor:"pointer",color:"#7a3530"}}>Forgot password?</span>
          </>}
          {mode==="signup" && <span onClick={()=>{setMode("login");setError("");setMessage("");}} style={{cursor:"pointer",color:"#7a3530",fontWeight:600}}>← Back to sign in</span>}
          {mode==="forgot" && <span onClick={()=>{setMode("login");setError("");setMessage("");}} style={{cursor:"pointer",color:"#7a3530",fontWeight:600}}>← Back to sign in</span>}
        </div>
      </div>
    </div>
  );
}

function ApiKeyBanner() {
  const [key, setKey] = useState(() => localStorage.getItem('claude_api_key') || '');
  const [input, setInput] = useState('');
  const [show, setShow] = useState(false);
  const [saved, setSaved] = useState(false);

  const hasKey = !!key;

  const saveKey = () => {
    const trimmed = input.trim();
    if (!trimmed) return;
    localStorage.setItem('claude_api_key', trimmed);
    window._claudeApiKey = trimmed;
    setKey(trimmed);
    setInput('');
    setSaved(true);
    setShow(false);
    setTimeout(() => setSaved(false), 3000);
  };

  const removeKey = () => {
    localStorage.removeItem('claude_api_key');
    window._claudeApiKey = '';
    setKey('');
    setSaved(false);
  };

  // Sync to window on mount
  useEffect(() => { if (key) window._claudeApiKey = key; }, []);

  return (
    <div style={{background: hasKey ? "#eaf2ea" : "#f5efea", borderBottom: "1px solid " + (hasKey ? "#b0ccb0" : "#cdb898"), padding:"10px 24px", fontSize:12}}>
      <div style={{maxWidth:1400, margin:"0 auto", display:"flex", alignItems:"center", gap:12, flexWrap:"wrap"}}>
        <span style={{fontSize:14}}>{hasKey ? "🔑" : "⚠️"}</span>
        {hasKey ? (
          <>
            <span style={{color:"#28622a", fontWeight:600}}>API key set — AI features active</span>
            {saved && <span style={{color:"#28622a"}}>✓ Saved!</span>}
            <button onClick={removeKey} style={{background:"none", border:"1px solid #b0ccb0", borderRadius:6, padding:"3px 10px", color:"#6a8a6a", cursor:"pointer", fontSize:11}}>Remove key</button>
          </>
        ) : (
          <>
            <span style={{color:"#6a4015", fontWeight:600}}>Add Anthropic API key to enable AI features</span>
            {!show ? (
              <button onClick={() => setShow(true)} style={{background:"#7a3530", border:"none", borderRadius:6, padding:"4px 12px", color:"#fff", cursor:"pointer", fontSize:11, fontWeight:600}}>+ Add Key</button>
            ) : (
              <div style={{display:"flex", gap:6, alignItems:"center"}}>
                <input
                  type="password"
                  value={input}
                  onChange={e => setInput(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && saveKey()}
                  placeholder="sk-ant-..."
                  style={{background:"#faf9f7", border:"1px solid #ccc8c0", borderRadius:6, padding:"5px 10px", fontSize:12, outline:"none", width:260}}
                  autoFocus
                />
                <button onClick={saveKey} style={{background:"#7a3530", border:"none", borderRadius:6, padding:"5px 12px", color:"#fff", cursor:"pointer", fontSize:11, fontWeight:600}}>Save</button>
                <button onClick={() => setShow(false)} style={{background:"none", border:"1px solid #ccc8c0", borderRadius:6, padding:"5px 10px", color:"#9a9aaa", cursor:"pointer", fontSize:11}}>Cancel</button>
              </div>
            )}
            <a href="https://console.anthropic.com" target="_blank" style={{color:"#7a3530", fontSize:11, marginLeft:4}}>Get a free key →</a>
          </>
        )}
      </div>
    </div>
  );
}

function App() {
  const [activeTab,setActiveTab]=useState("library");
  const [user,setUser]=useState(null);
  const [authLoading,setAuthLoading]=useState(true);
  const [syncing,setSyncing]=useState(false);
  const [books,setBooks]=useState(()=>ALL_BOOKS.map(b=>({...b,read:false,wishlist:false})));

  // Check auth on mount + listen for changes
  useEffect(()=>{
    supabase.auth.getSession().then(({data:{session}})=>{
      if(session?.user){ setUser(session.user); loadAndMerge(session.user.id); }
      setAuthLoading(false);
    });
    const {data:{subscription}}=supabase.auth.onAuthStateChange((_,session)=>{
      if(session?.user){ setUser(session.user); loadAndMerge(session.user.id); }
      else{ setUser(null); setBooks(ALL_BOOKS.map(b=>({...b,read:false,wishlist:false}))); }
    });
    return ()=>subscription.unsubscribe();
  },[]);

  const loadAndMerge=async(userId)=>{
    setSyncing(true);
    const saved=await loadStates(userId);
    setBooks(()=>{
      const extraBooks=Object.values(saved).filter(r=>r.extra_data?.isExtra).map(r=>r.extra_data.book).filter(Boolean);
      const base=ALL_BOOKS.map(b=>({
        ...b,
        read:saved[String(b.id)]?.read||false,
        wishlist:saved[String(b.id)]?.wishlist||false,
        rating:saved[String(b.id)]?.rating||b.rating,
      }));
      const titles=new Set(base.map(b=>b.title.toLowerCase()));
      const newBooks=extraBooks.filter(b=>!titles.has(b.title.toLowerCase()));
      return [...newBooks,...base];
    });
    setSyncing(false);
  };

  const addToLibrary=book=>{
    const newBook={...book,id:Date.now()+Math.random(),read:false,wishlist:false};
    setBooks(bs=>{
      if(bs.find(b=>b.title.toLowerCase()===newBook.title.toLowerCase()))return bs;
      // Save to Supabase as extra book
      if(user) saveState(user.id, String(newBook.id), false, false, newBook.rating, {isExtra:true, book:newBook});
      return [newBook,...bs];
    });
    setActiveTab("library");
  };
  const stats=useMemo(()=>({total:books.length,read:books.filter(b=>b.read).length,wishlist:books.filter(b=>b.wishlist).length,nyt:books.filter(b=>b.nyt).length}),[books]);

  // Supabase-synced toggle functions passed to LibraryTab
  const syncedSetBooks=(updater)=>{
    setBooks(prev=>{
      const updated=updater(prev);
      // Find what changed and sync to Supabase
      if(user){
        updated.forEach((b,i)=>{
          const old=prev.find(o=>o.id===b.id);
          if(old&&(old.read!==b.read||old.wishlist!==b.wishlist||old.rating!==b.rating)){
            saveState(user.id,String(b.id),b.read,b.wishlist,b.rating,null);
          }
        });
      }
      return updated;
    });
  };

  if(authLoading) return(
    <div style={{minHeight:"100vh",background:"#f0ede8",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center"}}><div style={{fontSize:36,animation:"spin 1s linear infinite",display:"inline-block"}}>◎</div><div style={{color:"#9a9aaa",fontSize:14,marginTop:12}}>Loading…</div></div>
    </div>
  );

  if(!user) return <AuthScreen onAuth={u=>{setUser(u);loadAndMerge(u.id);}}/>;

  return(
    <div style={{minHeight:"100vh",background:"#f0ede8",color:"#2c2c3a"}}>
      <ApiKeyBanner/>
      <div style={{background:"#f5f2ee",borderBottom:"1px solid #d8d4cc",padding:"18px 24px 0",boxShadow:"0 1px 4px rgba(0,0,0,.06)",position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:1400,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:14,marginBottom:14}}>
            <div>
              <div style={{fontSize:9,color:"#7a3530",letterSpacing:4,textTransform:"uppercase",fontFamily:"monospace",fontWeight:700,marginBottom:4}}>◆ PERSONAL READING VAULT</div>
              <h1 style={{fontSize:22,fontWeight:900,margin:0,color:"#1e1e2a"}}>My Book Library {syncing&&<span style={{fontSize:10,color:"#9a9aaa",fontWeight:400,marginLeft:6}}>⟳ syncing…</span>}</h1>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
              <button onClick={()=>supabase.auth.signOut()} style={{background:"none",border:"1px solid #ccc8c0",borderRadius:8,padding:"5px 12px",color:"#9a9aaa",cursor:"pointer",fontSize:11}}>Sign out</button>
              {[["📚",stats.total,"Total","#edeaf5","#342058"],["✓",stats.read,"Read","#eaf2ea","#28622a"],["♥",stats.wishlist,"Wishlist","#f2ebe6","#8a4a18"],["📰",stats.nyt,"NYT","#f2e8e8","#8b2e2e"]].map(([icon,val,label,bg,color])=>(
                <div key={label} style={{background:bg,border:`1px solid ${color}30`,borderRadius:9,padding:"6px 12px",textAlign:"center",minWidth:52}}>
                  <div style={{fontSize:12}}>{icon}</div><div style={{fontSize:16,fontWeight:800,color}}>{val}</div><div style={{fontSize:8,color:"#9a9aaa",textTransform:"uppercase",letterSpacing:1}}>{label}</div>
                </div>
              ))}
            </div>
          </div>
          <div style={{display:"flex",gap:0}}>
            {[{id:"library",label:"📖 My Library",count:books.length},{id:"recommendations",label:"✦ Recommendations",count:null}].map(tab=>(
              <button key={tab.id} onClick={()=>setActiveTab(tab.id)} style={{padding:"10px 22px",background:"none",border:"none",borderBottom:`3px solid ${activeTab===tab.id?"#7a3530":"transparent"}`,color:activeTab===tab.id?"#7a3530":"#9a9aaa",fontWeight:activeTab===tab.id?800:500,fontSize:13,cursor:"pointer",marginBottom:-1,display:"flex",alignItems:"center",gap:6}}>
                {tab.label}
                {tab.count!==null&&<span style={{background:activeTab===tab.id?"#ede0df":"#e8e4dc",color:activeTab===tab.id?"#7a3530":"#9a9aaa",fontSize:10,padding:"1px 7px",borderRadius:20,fontWeight:700}}>{tab.count}</span>}
              </button>
            ))}
          </div>
        </div>
      </div>
      {activeTab==="library"&&<LibraryTab books={books} setBooks={syncedSetBooks}/>}
      {activeTab==="recommendations"&&<RecommendationsTab onAddToLibrary={addToLibrary}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

      .catch(e => console.log('SW failed:', e));
  });

</body>
